<!-- SADECE SCRIPT KISMINI DEĞİŞTİRİYORUZ -->
<script>
const STORAGE_KEY = "orenda_personnel_v2";

let personnel = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

let selectedSendId = null;
let tempImage = null;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(personnel));
}

function addPerson() {
  const name = nameInput.value.trim();
  const phone = phoneInput.value.trim();
  const city = cityInput.value.trim();
  const job = jobInput.value.trim();

  if (!name || !phone || !city || !job) {
    alert("Zorunlu alanları doldur kral");
    return;
  }

  personnel.unshift({
    id: Date.now(),
    name,
    phone,
    city,
    job,
    status: "Normal",
    sent: null
  });

  save();
  render();
}

function openSendModal(id) {
  selectedSendId = id;
  document.getElementById("sendBox").style.display = "block";
}

function handleImage(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    tempImage = reader.result;
    preview.src = tempImage;
    preview.style.display = "block";
  };

  if (file) reader.readAsDataURL(file);
}

function confirmSend() {
  const place = sendPlace.value;
  const note = sendNote.value;

  personnel = personnel.map(p => {
    if (p.id === selectedSendId) {
      return {
        ...p,
        sent: {
          place,
          note,
          date: new Date().toLocaleDateString(),
          image: tempImage
        }
      };
    }
    return p;
  });

  save();
  closeModal();
  render();
}

function closeModal() {
  document.getElementById("sendBox").style.display = "none";
  tempImage = null;
}

function render() {
  const list = document.getElementById("list");
  const sentList = document.getElementById("sentList");

  list.innerHTML = "";
  sentList.innerHTML = "";

  personnel.forEach(p => {
    const div = document.createElement("div");
    div.innerHTML = `
      <div style="border:1px solid #333;padding:10px;margin:10px 0">
        <b>${p.name}</b> - ${p.job} (${p.city})
        <br>${p.phone}
        <br>
        ${p.sent ? "<span style='color:lime'>İşe Gönderildi</span>" : ""}
        <br>
        <button onclick="openSendModal(${p.id})">İşe Gönder</button>
      </div>
    `;
    list.appendChild(div);

    if (p.sent) {
      const s = document.createElement("div");
      s.innerHTML = `
        <div style="border:1px solid red;padding:10px;margin:10px 0">
          <b>${p.name}</b>
          <br>Yer: ${p.sent.place}
          <br>Tarih: ${p.sent.date}
          <br>Not: ${p.sent.note}
          ${p.sent.image ? `<br><img src="${p.sent.image}" width="120">` : ""}
        </div>
      `;
      sentList.appendChild(s);
    }
  });
}

render();
</script>

<!-- MODAL -->
<div id="sendBox" style="display:none;position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#111;padding:20px;border-radius:10px;">
  <h3>İşe Gönder</h3>
  <input id="sendPlace" placeholder="Nereye gönderildi">
  <input type="file" onchange="handleImage(event)">
  <img id="preview" style="display:none;width:100px;">
  <textarea id="sendNote" placeholder="Not"></textarea>
  <br>
  <button onclick="confirmSend()">Kaydet</button>
  <button onclick="closeModal()">Kapat</button>
</div>
