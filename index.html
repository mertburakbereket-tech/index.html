<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orenda Personel Paneli</title>
    <style>
      * { box-sizing: border-box; }
      :root {
        --bg: #0b1020;
        --card: #11182d;
        --card-2: #0f172a;
        --border: rgba(255,255,255,0.08);
        --text: #fff;
        --muted: #94a3b8;
        --primary: #22d3ee;
        --danger: #ef4444;
        --soft: #334155;
        --ok: #22c55e;
        --warn-bg: rgba(239,68,68,0.12);
        --warn-border: rgba(239,68,68,0.28);
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .title h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }
      .title p {
        margin: 0;
        color: var(--muted);
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn-primary {
        background: var(--primary);
        color: #0b1020;
      }
      .btn-secondary {
        background: var(--card);
        color: #fff;
        border: 1px solid var(--border);
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 20px;
      }
      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
      }
      .stat-card .label {
        color: var(--muted);
        font-size: 14px;
      }
      .stat-card .value {
        font-size: 28px;
        font-weight: 700;
        margin-top: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 20px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
      }
      h2, h3 {
        margin-top: 0;
      }
      input, select, textarea {
        width: 100%;
        margin-bottom: 10px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.1);
        background: var(--bg);
        color: white;
        outline: none;
      }
      textarea {
        min-height: 90px;
        resize: vertical;
      }
      .filters {
        display: grid;
        grid-template-columns: 1.3fr 0.9fr 0.9fr;
        gap: 10px;
        margin-bottom: 16px;
      }
      .person {
        background: var(--card-2);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .person.blacklisted {
        border-color: rgba(239,68,68,0.45);
        box-shadow: inset 0 0 0 1px rgba(239,68,68,0.18);
      }
      .person.sent-person {
        border-color: rgba(34,197,94,0.4);
      }
      .person-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .person-name {
        font-size: 18px;
        font-weight: 700;
      }
      .badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .badge {
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .badge-normal {
        background: rgba(148,163,184,0.18);
        color: #cbd5e1;
      }
      .badge-black {
        background: rgba(239,68,68,0.18);
        color: #fca5a5;
      }
      .badge-sent {
        background: rgba(34,197,94,0.18);
        color: #86efac;
      }
      .meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0,1fr));
        gap: 8px;
        margin-top: 12px;
        color: #cbd5e1;
        font-size: 14px;
      }
      .note {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border);
        color: #dbe3ee;
        font-size: 14px;
        line-height: 1.5;
      }
      .warning {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: var(--warn-bg);
        color: #fca5a5;
        border: 1px solid var(--warn-border);
        font-size: 13px;
        font-weight: 700;
      }
      .sent-box {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(34,197,94,0.08);
        border: 1px solid rgba(34,197,94,0.18);
      }
      .sent-box h4 {
        margin: 0 0 10px;
        color: #86efac;
      }
      .sent-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0,1fr));
        gap: 8px;
        font-size: 14px;
        color: #d7ffe1;
      }
      .id-photo {
        margin-top: 12px;
        max-width: 180px;
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      .person-actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
        flex-wrap: wrap;
      }
      .small-btn {
        border: none;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 700;
      }
      .danger { background: var(--danger); color: white; }
      .muted { background: var(--soft); color: white; }
      .success { background: var(--ok); color: white; }
      .empty-state {
        padding: 24px;
        border-radius: 14px;
        border: 1px dashed var(--border);
        color: var(--muted);
        text-align: center;
      }
      .helper {
        color: var(--muted);
        font-size: 13px;
        margin-top: 2px;
        margin-bottom: 12px;
      }
      .section-gap {
        margin-top: 22px;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 50;
      }
      .modal {
        width: 100%;
        max-width: 520px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
      }
      .preview-image {
        max-width: 140px;
        border-radius: 12px;
        border: 1px solid var(--border);
        display: none;
        margin: 8px 0 12px;
      }
      @media (max-width: 1100px) {
        .stats { grid-template-columns: repeat(2, minmax(0,1fr)); }
        .grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 720px) {
        .filters { grid-template-columns: 1fr; }
        .meta, .sent-grid { grid-template-columns: 1fr; }
        .stats { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="title">
          <h1>Orenda Personel Paneli</h1>
          <p>Ekibe özel sade personel kayıt, bulma ve işe gönderim takibi</p>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="scrollToForm()">Personel Ekle</button>
          <button class="btn btn-secondary" onclick="scrollToList()">Personel Bul</button>
          <button class="btn btn-secondary" onclick="scrollToSentList()">İşe Gönderilenler</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="label">Toplam Personel</div>
          <div class="value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Kara Listedekiler</div>
          <div class="value" id="statBlack">0</div>
        </div>
        <div class="stat-card">
          <div class="label">İşe Gönderilenler</div>
          <div class="value" id="statSent">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Bugün Eklenen</div>
          <div class="value" id="statToday">0</div>
        </div>
      </div>

      <div class="grid">
        <div class="card" id="formSection">
          <h2>Personel Ekle</h2>
          <input id="name" placeholder="Ad soyad" />
          <input id="phone" placeholder="Telefon" />
          <input id="city" placeholder="Şehir" />
          <input id="district" placeholder="İlçe" />
          <input id="job" placeholder="Meslek / Pozisyon" />
          <select id="workType">
            <option value="">Çalışma tipi seç</option>
            <option>Yatılı</option>
            <option>Gündüzlü</option>
            <option>Gece</option>
            <option>Yatılı / Gündüzlü</option>
          </select>
          <input id="availability" placeholder="Uygunluk (ör: Hemen Başlar)" />
          <textarea id="note" placeholder="Not"></textarea>
          <div class="helper">Zorunlu alanlar: Ad soyad, telefon, şehir, meslek</div>
          <button class="btn btn-primary" style="width:100%" onclick="addPerson()">Kaydet</button>
        </div>

        <div class="card" id="listSection">
          <h2>Personel Bul</h2>

          <div class="filters">
            <input id="searchInput" placeholder="İsim, telefon, şehir, ilçe, meslek ara..." />
            <select id="filterWorkType">
              <option value="">Tüm Çalışma Tipleri</option>
              <option>Yatılı</option>
              <option>Gündüzlü</option>
              <option>Gece</option>
              <option>Yatılı / Gündüzlü</option>
            </select>
            <select id="filterStatus">
              <option value="">
