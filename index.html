<script>
  const STORAGE_KEY = "orenda_personnel_final_v1";
  const AUTH_KEY = "orenda_login_ok_v1";
  const LOGIN_USERNAME = "kudretliburak";
  const LOGIN_PASSWORD = "evetkudretliburak";

  function loadPersonnel() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    try {
      return JSON.parse(raw);
    } catch (e) {
      return [];
    }
  }

  let personnel = loadPersonnel();
  let selectedSendId = null;
  let tempImageData = "";

  function savePersonnel() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(personnel));
  }

  function addPerson() {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const city = document.getElementById("city").value.trim();
    const district = document.getElementById("district").value.trim();
    const job = document.getElementById("job").value.trim();
    const workType = document.getElementById("workType").value.trim();
    const availability = document.getElementById("availability").value.trim();
    const note = document.getElementById("note").value.trim();

    if (!name || !phone || !city || !job) {
      alert("Zorunlu alanları doldur.");
      return;
    }

    const newPerson = {
      id: Date.now(),
      name,
      phone,
      city,
      district,
      job,
      workType,
      availability,
      note,
      status: "Normal",
      createdAt: new Date().toISOString(),
      sentInfo: null
    };

    personnel.unshift(newPerson);
    savePersonnel();
    renderAll();
  }

  function toggleBlacklist(id) {
    personnel = personnel.map(p =>
      p.id === id
        ? { ...p, status: p.status === "Kara Liste" ? "Normal" : "Kara Liste" }
        : p
    );
    savePersonnel();
    renderAll();
  }

  function openSendModal(id) {
    selectedSendId = id;
    document.getElementById("sendModal").style.display = "flex";
  }

  function closeSendModal() {
    document.getElementById("sendModal").style.display = "none";
    selectedSendId = null;
  }

  function confirmSend() {
    const place = document.getElementById("sendPlace").value.trim();
    const date = document.getElementById("sendDate").value;
    const note = document.getElementById("sendNote").value.trim();

    if (!selectedSendId) return;
    if (!place || !date) {
      alert("Yer ve tarih zorunlu.");
      return;
    }

    personnel = personnel.map(p =>
      p.id === selectedSendId
        ? {
            ...p,
            status: "İşe Gönderildi",
            sentInfo: { place, date, note }
          }
        : p
    );

    savePersonnel();
    closeSendModal();
    renderAll();
  }

  function renderPersonnelList() {
    const listEl = document.getElementById("personnelList");
    const search = document.getElementById("searchInput").value.toLowerCase();
    const workType = document.getElementById("filterWorkType").value;
    const status = document.getElementById("filterStatus").value;

    const filtered = personnel.filter(p => {
      const text = (
        p.name + p.phone + p.city + p.district + p.job + p.note
      ).toLowerCase();

      const searchMatch = !search || text.includes(search);
      const workMatch = !workType || p.workType === workType;
      const statusMatch = !status || p.status === status;

      return searchMatch && workMatch && statusMatch;
    });

    if (!filtered.length) {
      listEl.innerHTML = "Kayıt yok.";
      return;
    }

    listEl.innerHTML = filtered.map(p => `
      <div class="person">
        <b>${p.name}</b> - ${p.job} - ${p.phone}
        <br>Durum: ${p.status}
        <br>
        <button onclick="openSendModal(${p.id})">İşe Gönder</button>
        <button onclick="toggleBlacklist(${p.id})">Kara Liste</button>
      </div>
    `).join("");
  }

  function renderSentList() {
    const sentListEl = document.getElementById("sentList");
    const sentPeople = personnel.filter(p => p.status === "İşe Gönderildi");

    if (!sentPeople.length) {
      sentListEl.innerHTML = "Henüz gönderilen yok.";
      return;
    }

    sentListEl.innerHTML = sentPeople.map(p => `
      <div class="person">
        <b>${p.name}</b>
        <br>Yer: ${p.sentInfo?.place || "-"}
        <br>Tarih: ${p.sentInfo?.date || "-"}
      </div>
    `).join("");
  }

  function renderAll() {
    renderPersonnelList();
    renderSentList();
  }

  renderAll();
</script>
